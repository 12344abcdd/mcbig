plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // 本地 libs 所有 jar，区分编译/运行时
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
    runtimeOnly fileTree(dir: 'libs', include: ['*.jar'])
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'net.minecraft.client.main.Main'
}
